name: "@bookstore/storefront"
version: 1.0

root: ~/Desktop/bookstore/storefront
index: ~/Desktop/bookstore/storefront/index.yaml

description: >
  This module defines the public-facing storefront layer of BookstoreOS.
  Each section controls part of the user experience: promotion, interaction, display, and navigation.
  Trusted and rejected files are managed per component to allow real-time content control and moderation.

layout:
  - title: Ads
    index: ads/index.yaml
    summary: >
      Promotional materials, banners, announcements, and marketplace advertisements
      displayed across the storefront.
    trusted: ads/trusted.yaml
    rejected: ads/rejected.yaml

  - title: Cart
    index: cart/index.yaml
    summary: >
      Handles user checkout logic, preview flows, and transactional states.
      May include digital goods, licenses, token interactions, or book-based items.
    trusted: cart/trusted.yaml
    rejected: cart/rejected.yaml

  - title: Display
    index: display/index.yaml
    summary: >
      Visual layout elements: bookcases, bookbags, shelves, and stands.
      Controls the organization of book presentation in UI.
    trusted: display/trusted.yaml
    rejected: display/rejected.yaml

  - title: Dropbox
    index: dropbox/index.yaml
    summary: >
      Handles user submissions, returns, feedback, and async uploads.
      Can be used for reviews, refunds, drafts, or external memory sync.
    trusted: dropbox/trusted.yaml
    rejected: dropbox/rejected.yaml

  - title: Hours
    index: hours/index.yaml
    summary: >
      Controls open/close schedules, holidays, and dynamic availability of store sections.
    trusted: hours/trusted.yaml
    rejected: hours/rejected.yaml

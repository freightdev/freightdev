      hostname: ""
      ip: ""
      role: ""
      specs:
        os: ""
        ram: ""
        cpu: ""
        storage: ""
      
      services:
        # What runs here?
    
    hostbox:
      hostname: ""
      ip: ""
      role: ""
      specs:
        os: ""
        ram: ""
        cpu: ""
        storage: ""
      
      services:
        # What runs here?
    
    callbox:
      hostname: ""
      ip: ""
      role: ""
      specs:
        os: ""
        ram: ""
        cpu: ""
        storage: ""
      
      services:
        # What runs here?
    
    safebox:
      hostname: ""
      ip: ""
      role: ""
      provider: ""  # Oracle Cloud? AWS? Self-hosted?
      specs:
        os: ""
        ram: ""
        cpu: ""
        storage: ""
      
      services:
        # What runs here?
    
    # Add more boxes if you have them
    # box_name:
    #   ...


################################################################################
#                         VIRTUALIZATION LAYER
################################################################################

virtualization:
  
  # Firecracker microVMs
  firecracker:
    enabled: true  # You said you're using this
    version: ""  # Which version?
    
    use_cases:
      # What are you using Firecracker for?
      # - Agent isolation
      # - Wheeler Tools
      # - Training scenarios
      # - Driver workspaces
      # Add your specific use cases
    
    configuration:
      kernel:
        path: ""  # Where's your kernel?
        version: ""  # Linux 6.1? 5.10?
      
      rootfs:
        base_image: ""  # Alpine? Debian minimal? Custom?
        size: ""  # 100MB? 500MB?
      
      networking:
        mode: ""  # Bridge? NAT? Custom?
        subnet: ""  # e.g., 172.16.0.0/24
      
      storage:
        backend: ""  # LVM2? Raw files?
    
    rust_controller:
      location: ""  # ~/WORKSPACE/openhwy/infra/firecracker-controller?
      
      endpoints:
        # What APIs does your controller expose?
        # - POST /vm/create
        # - POST /vm/start
        # - POST /vm/stop
        # Add your endpoints
      
      features:
        # What does your controller do?
        # - Snapshot management
        # - Network configuration
        # - Metrics collection
        # Add your features
  
  # KVM (for when you need full VMs)
  kvm:
    enabled: true  # You said you have libvirt/KVM
    
    use_cases:
      # When do you use KVM instead of Firecracker?
      # - Heavy workloads
      # - GPU passthrough
      # - Windows VMs
      # Add your use cases
    
    management:
      tool: "libvirt"  # You mentioned this
      api: ""  # virsh? Custom Rust wrapper?
    
    rust_controller:
      location: ""  # If you have one
      
      endpoints:
        # Your KVM controller API
      
      features:
        # What does it do?


################################################################################
#                         ORCHESTRATION LAYER
################################################################################

orchestration:
  
  # Nomad
  nomad:
    enabled: true  # You said you're using this
    version: ""
    
    cluster:
      servers:
        # Which boxes run Nomad servers?
        # - workbox
        # - hostbox
        # - callbox
      
      clients:
        # Which boxes run Nomad clients?
        # All of them?
    
    configuration:
      datacenter: ""  # Name of your datacenter
      region: ""  # Default region name
      
      driver_plugins:
        # What drivers are you using?
        # - docker
        # - exec
        # - raw_exec
        # - firecracker (custom plugin?)
        # - qemu (for KVM)
    
    jobs:
      # What Nomad jobs do you have?
      # Structure:
      # job_name:
      #   type: "service" | "batch" | "system"
      #   driver: "docker" | "exec" | "firecracker"
      #   description: ""
      
      # Example structure (fill in your actual jobs):
      # hwy_agent:
      #   type: ""
      #   driver: ""
      #   count: ""
      #   resources:
      #     cpu: ""
      #     memory: ""
    
    rust_controller:
      location: ""  # Do you have a Nomad API wrapper?
      
      purpose: |
        # What does your controller do?
        # - Job submission
        # - Health monitoring
        # - Auto-scaling
  
  # Consul (service discovery)
  consul:
    enabled: ""  # true/false - comes with Nomad, are you using it?
    version: ""
    
    configuration:
      # Consul settings
    
    services:
      # What services are registered in Consul?



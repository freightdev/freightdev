    type: ""  # MinIO? S3? Custom?
    enabled: ""
    
    buckets:
      # What buckets/namespaces exist?
      # bucket_name:
      #   purpose: ""
      #   size_limit: ""
      #   retention: ""
    
    rust_controller:
      location: ""
      
      purpose: |
        # What does your object storage controller do?
  
  # Block Storage
  block_storage:
    # Are you using anything beyond LVM2?
    # Ceph? Custom solution?
  
  # File Storage
  file_storage:

      #   size: ""
      #   mount_point: ""
      #   filesystem: ""  # ext4? xfs?
    
    rust_controller:
      location: ""  # ~/WORKSPACE/openhwy/infra/lvm-controller?
      
      purpose: |
        # What does your LVM controller do?
        # - Dynamic volume creation
        # - Snapshot management
        # - Thin provisioning
        # - Volume resizing
      

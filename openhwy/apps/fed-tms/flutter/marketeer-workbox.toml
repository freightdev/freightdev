# Marketeer Configuration - Workbox Control Center
# Workbox (Hyprland) controls 4 headless Debian systems

[[systems]]
name = "workbox"
hostname = "localhost"
role = "control-center"
ssh_user = "admin"
primary = true
headless = false

[[systems]]
name = "helpbox"
hostname = "helpbox"  # or IP address
role = "support"
ssh_user = "admin"
headless = true

[[systems]]
name = "hostbox"
hostname = "hostbox"  # or IP address
role = "hosting"
ssh_user = "admin"
headless = true

[[systems]]
name = "callbox"
hostname = "callbox"  # or IP address
role = "monitoring"
ssh_user = "admin"
headless = true

[[systems]]
name = "safebox"
hostname = "your-oracle-ip"  # Replace with actual IP
role = "backup"
ssh_user = "admin"
headless = true
cloud = true

# Monitoring settings
[monitoring]
refresh_interval = 5
ssh_timeout = 10
cpu_alert_threshold = 80.0
memory_alert_threshold = 85.0

# Agent settings
[agents]
moon_env_path = "/home/admin/bin/moon-env"
agent_config_dir = "/home/admin/agents"
log_dir = "/var/log/agents"

# Hyprland integration
[hyprland]
terminal = "alacritty"  # or "kitty"
editor = "nvim"
ssh_in_split = true  # Open SSH in new split

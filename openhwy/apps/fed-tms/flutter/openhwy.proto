syntax = "proto3";

package openhwy;

// System status message
message System {
  string name = 1;
  string hostname = 2;
  SystemStatus status = 3;
  float cpu_usage = 4;
  float memory_usage = 5;
  string memory_total = 6;
  int32 agent_count = 7;
  repeated Agent agents = 8;
  int64 uptime_seconds = 9;
}

enum SystemStatus {
  SYSTEM_STATUS_UNKNOWN = 0;
  SYSTEM_STATUS_ONLINE = 1;
  SYSTEM_STATUS_OFFLINE = 2;
  SYSTEM_STATUS_DEGRADED = 3;
}

// Agent status message
message Agent {
  string name = 1;
  string system_name = 2;
  AgentStatus status = 3;
  AgentType type = 4;
  float cpu_usage = 5;
  string memory_usage = 6;
  int64 uptime_seconds = 7;
  int32 pid = 8;
  string config_path = 9;
}

enum AgentStatus {
  AGENT_STATUS_UNKNOWN = 0;
  AGENT_STATUS_RUNNING = 1;
  AGENT_STATUS_STOPPED = 2;
  AGENT_STATUS_ERROR = 3;
  AGENT_STATUS_STARTING = 4;
}

enum AgentType {
  AGENT_TYPE_UNKNOWN = 0;
  AGENT_TYPE_HWY = 1;       // Security & Connections
  AGENT_TYPE_FED = 2;       // Fleet Director
  AGENT_TYPE_ELDA = 3;      // Creator & Architect
  AGENT_TYPE_ECO = 4;       // Matching Engine
  AGENT_TYPE_TRAKA = 5;     // Tool Manager
  AGENT_TYPE_WHEELER = 6;   // Driver tools
}

// Request/Response messages
message ListSystemsRequest {}

message ListSystemsResponse {
  repeated System systems = 1;
}

message ExecuteCommandRequest {
  string system_name = 1;
  string command = 2;
  repeated string args = 3;
}

message ExecuteCommandResponse {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
}

message LaunchAgentRequest {
  string system_name = 1;
  AgentType agent_type = 2;
  string config_path = 3;
  string script_path = 4;
}

message LaunchAgentResponse {
  bool success = 1;
  string message = 2;
  int32 pid = 3;
}

message KillAgentRequest {
  string system_name = 1;
  string agent_name = 2;
  int32 pid = 3;
}

message KillAgentResponse {
  bool success = 1;
  string message = 2;
}

message GetLogsRequest {
  string system_name = 1;
  string agent_name = 2;
  int32 line_count = 3;
}

message GetLogsResponse {
  repeated LogEntry logs = 1;
}

message LogEntry {
  int64 timestamp = 1;
  LogLevel level = 2;
  string message = 3;
  string source = 4;
}

enum LogLevel {
  LOG_LEVEL_UNKNOWN = 0;
  LOG_LEVEL_DEBUG = 1;
  LOG_LEVEL_INFO = 2;
  LOG_LEVEL_WARN = 3;
  LOG_LEVEL_ERROR = 4;
}

// WebSocket streaming messages
message SystemUpdateEvent {
  System system = 1;
  int64 timestamp = 2;
}

message AgentUpdateEvent {
  Agent agent = 1;
  int64 timestamp = 2;
}

message LogEvent {
  LogEntry log = 1;
}

// Service definitions
service OpenHWYService {
  rpc ListSystems(ListSystemsRequest) returns (ListSystemsResponse);
  rpc ExecuteCommand(ExecuteCommandRequest) returns (ExecuteCommandResponse);
  rpc LaunchAgent(LaunchAgentRequest) returns (LaunchAgentResponse);
  rpc KillAgent(KillAgentRequest) returns (KillAgentResponse);
  rpc GetLogs(GetLogsRequest) returns (GetLogsResponse);
  rpc StreamUpdates(stream SystemUpdateEvent) returns (stream SystemUpdateEvent);
}

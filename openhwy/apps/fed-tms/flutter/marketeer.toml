# Marketeer Configuration
# Your 5-box OpenHWY infrastructure

[[systems]]
name = "workbox"
hostname = "workbox"
role = "development"
ssh_user = "admin"
primary = true

[[systems]]
name = "helpbox"
hostname = "helpbox"
role = "support"
ssh_user = "admin"

[[systems]]
name = "hostbox"
hostname = "hostbox"
role = "hosting"
ssh_user = "admin"

[[systems]]
name = "callbox"
hostname = "callbox"
role = "monitoring"
ssh_user = "admin"

[[systems]]
name = "safebox"
hostname = "safebox.oraclecloud.com"  # Your Oracle Cloud hostname
role = "backup"
ssh_user = "admin"
cloud = true

# Monitoring settings
[monitoring]
refresh_interval = 5  # seconds
ssh_timeout = 10      # seconds
cpu_alert_threshold = 80.0
memory_alert_threshold = 85.0

# Agent settings
[agents]
moon_env_path = "/home/admin/moon-env/target/release/moon-env"
agent_config_dir = "/home/admin/agents"
log_dir = "/var/log/agents"

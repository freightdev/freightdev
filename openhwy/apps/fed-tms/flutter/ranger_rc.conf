# Ranger Keybindings for OpenHWY
# Add to ~/.config/ranger/rc.conf

# OpenHWY Tools
map om shell ~/bin/marketeer-dashboard ~/marketeer-workbox.toml
map oa shell ~/bin/agent-builder
map os shell openhwy status

# SSH shortcuts
map oh shell ssh admin@helpbox
map oo shell ssh admin@hostbox
map oc shell ssh admin@callbox
map ob shell ssh admin@safebox

# Quick moon-env launch (on selected file)
map or shell ~/bin/moon-env %f

# OpenHWY menu (shows all options)
map oH shell openhwy help

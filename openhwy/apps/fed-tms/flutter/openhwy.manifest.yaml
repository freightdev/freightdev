legal:
  
  entity:
    name: "OpenHWY Foundation"
    type: "501(c)(3) Non-Profit"
    jurisdiction: "Delaware, USA"
    
    board:
      - "Founder (you)"
      - "2 industry experts (TBD)"
      - "2 driver representatives (elected)"
    
    mission:
      - "Develop and maintain OpenHWY Protocol"
      - "Protect driver interests"
      - "Ensure protocol remains open and free"
  
  subsidiary:
    name: "OpenHWY Labs, Inc."
    type: "Delaware C-Corp"
    ownership: "Owned by OpenHWY Foundation"
    
    purpose:
      - "Operate fedispatching.com"
      - "Provide commercial services"
      - "Generate revenue to fund foundation"
  
  compliance:
    fmcsa:
      - "Broker authority (MC number)"
      - "Surety bond ($75,000)"
      - "FMCSA registration"
    
    insurance:
      general_liability: "$2M policy"
      cyber_liability: "$1M policy"
      errors_omissions: "$1M policy"
    
    data_protection:
      gdpr: "Compliant (EU drivers)"
      ccpa: "Compliant (CA drivers)"
      
      measures:
        - "Encryption at rest and in transit"
        - "Right to be forgotten (automated)"
        - "Data portability (API exports)"
        - "Privacy policy (transparent)"
    
    financial:
      payments: "PCI-DSS Level 1 compliant"
      taxes: "CPA firm (quarterly filing)"
      payroll: "Gusto (automated)"



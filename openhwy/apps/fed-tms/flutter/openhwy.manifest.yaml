################################################################################
#                         OPENHWY LICENSE SYSTEM
################################################################################

openhwy_license:
  name: "OpenHWY License"
  tagline: "Portable, Verifiable, Driver-Owned Credential"
  
  blockchain:
    network: "Solana"
    token_standard: "SPL Token (Non-Fungible)"
    contract: "TBD (deploy on Solana mainnet)"
  
  structure:
    license_id: "Unique UUID"
    driver_name: "String"
    issue_date: "Timestamp"
    expiry_date: "Timestamp (3 years from issue)"
    level: "Integer (1-5)"
    
    reputation:
      total_deliveries: "Integer"
      on_time_rate: "Float (0.0-1.0)"
      customer_rating: "Float (0.0-5.0)"
      safety_score: "Float (0.0-100.0)"
    
    certifications:
      - "Hazmat"
      - "Tanker"
      - "Doubles/Triples"
      - "Passenger"
      - "School Bus"
    
    training_completed:
      - "Array of scenario IDs from ELDA"
    
    metadata:
      blockchain_address: "Solana public key"
      ipfs_hash: "Immutable storage of full credential"
  
  levels:
    level_1:
      name: "Rookie"
      requirements:
        - "Complete basic training (10 scenarios)"
        - "CDL verified"
      
      benefits:
        - "Access to basic last-mile jobs"
        - "Standard rates"
    
    level_2:
      name: "Trucker"
      requirements:
        - "50+ completed deliveries"
        - "95%+ on-time rate"
        - "4.0+ customer rating"
      
      benefits:
        - "Access to all standard jobs"
        - "Priority matching"
        - "5% rate premium"
    
    level_3:
      name: "Veteran"
      requirements:
        - "200+ completed deliveries"
        - "97%+ on-time rate"
        - "4.5+ customer rating"
        - "1+ specialty certification"
      
      benefits:
        - "Access to premium jobs"
        - "Top priority matching"
        - "10% rate premium"
        - "Training revenue share (ELDA)"
    
    level_4:
      name: "Master"
      requirements:
        - "500+ completed deliveries"
        - "98%+ on-time rate"
        - "4.8+ customer rating"
        - "3+ specialty certifications"
        - "Mentor 10+ drivers"
      
      benefits:
        - "Access to all jobs (including hazmat)"
        - "VIP matching (first pick)"
        - "15% rate premium"
        - "Higher training revenue share"
        - "Voice in protocol governance"
    
    level_5:
      name: "Legend"
      requirements:
        - "1000+ completed deliveries"
        - "99%+ on-time rate"
        - "4.9+ customer rating"
        - "All specialty certifications"
        - "Mentor 50+ drivers"
        - "Contribute significant training content"
      
      benefits:
        - "Unrestricted access"
        - "Custom rate negotiation"
        - "20% rate premium"
        - "Maximum training revenue share"
        - "Protocol governance voting rights"
        - "OpenHWY advisory board eligibility"
  
  verification:
    method: "On-chain + off-chain hybrid"
    
    on_chain:
      - "License ID"
      - "Driver public key"
      - "Level"
      - "Issue date"
      - "Expiry date"
    
    off_chain:
      - "Personal information (name, CDL number)"
      - "Detailed reputation metrics"
      - "Training history"
    
    verification_api:
      endpoint: "GET /api/license/verify/{license_id}"
      response_time: "<100ms"
      cached: true
  
  portability:
    - "Works across all OpenHWY implementations"
    - "Platform-agnostic (Uber Freight, DoorDash, etc. can integrate)"
    - "Driver owns private key (can't be revoked without consensus)"
    - "Reputation aggregated across all platforms"


################################################################################
#                         PROTOCOL & STANDARDS
################################################################################

protocol:
  name: "OpenHWY Protocol"
  version: "1.0.0"
  license: "Apache 2.0 (open source)"
  
  specification:
    format: "Protocol Buffers (protobuf)"
    location: "https://github.com/openhwy/protocol"
    
    core_messages:
      - "JobOffer"
      - "JobAcceptance"
      - "DeliveryConfirmation"
      - "LicenseVerification"
      - "PaymentInstruction"
      - "DisputeResolution"
  
  implementations:
    reference:
      name: "OpenHWY Reference Implementation"
      language: "Rust"
      repository: "https://github.com/openhwy/openhwy-rs"
    
    expected_3rd_party:
      - "Uber Freight (internal implementation)"
      - "DoorDash Drive (SDK integration)"
      - "C.H. Robinson (API adapter)"
      - "70+ other logistics platforms (goal)"
  
  governance:
    model: "OpenHWY Foundation (non-profit)"
    voting_rights: "Level 4+ license holders"
    
    decisions:
      - "Protocol upgrades"
      - "New feature proposals"
      - "Dispute resolution policies"
      - "Rate floor enforcement"
  
  interoperability:
    standards:
      - "ISO 28000 (Supply chain security)"
      - "FMCSA regulations (HOS, etc.)"
      - "Blockchain: Solana"
      - "APIs: REST, gRPC, WebSocket"


################################################################################
#                         DEPLOYMENT & INFRASTRUCTURE
################################################################################

deployment:
  
  containerization:
    platform: "Docker"
    
    images:
      - "openhwy/rust-backend:latest"
      - "openhwy/go-auth-service:latest"
      - "openhwy/go-user-service:latest"
      - "openhwy/go-payment-service:latest"
      - "openhwy/go-ollama-service:latest"
      - "openhwy/hwy-agent:latest"
      - "openhwy/fed-agent:latest"
      - "openhwy/elda-agent:latest"
      - "openhwy/eco-agent:latest"
      - "openhwy/traka-agent:latest"
    
    registry: "Docker Hub (public) + private registry (hostbox)"
  
  orchestration:
    tool: "systemd (simple, no K8s overhead)"
    
    units:
      - "openhwy-backend.service"
      - "openhwy-hwy.service"
      - "openhwy-fed.service"
      - "openhwy-elda.service"
      - "openhwy-eco.service"
      - "openhwy-traka.service"
      - "openhwy-caddy.service"
      - "openhwy-postgresql.service"
      - "openhwy-redis.service"
  
  networking:
    internal:
      subnet: "10.0.0.0/24"
      
      boxes:
        workbox: "10.0.0.1"
        helpbox: "10.0.0.2"
        hostbox: "10.0.0.3"
        callbox: "10.0.0.4"
        safebox: "(public IP, Oracle Cloud)"
      
      firewall:
        default: "DENY"
        
        allowed:
          - "SSH (port 22) from known IPs only"
          - "HTTP/HTTPS (80, 443) public"
          - "Internal services (8080-9006) within subnet only"
    
    external:
      domains:
        - "open-hwy.com → hostbox:443"
        - "api.open-hwy.com → workbox:8080"
        - "fedispatching.com → hostbox:443"
        - "8teenwheelers.com → hostbox:443"
        - "openhwy.dev → hostbox:443"
      
      dns:
        provider: "Cloudflare"
        features:
          - "DDoS protection"
          - "SSL/TLS (Let's Encrypt via Caddy)"
          - "CDN (static assets)"
  
  monitoring:
    metrics:
      tool: "Prometheus + Grafana"
      location: "callbox:9090 (Prometheus), callbox:3000 (Grafana)"
      
      targets:
        - "Rust backend (workbox:8080/metrics)"
        - "All agents (ports 9001-9005)"
        - "PostgreSQL (node exporter)"
        - "Redis (redis exporter)"
        - "System stats (node exporter on all boxes)"
      
      retention: "30 days"
    
    logging:
      tool: "Loki (Grafana)"
      aggregation: "All boxes → callbox:3100"
      
      log_sources:
        - "Systemd journal"
        - "Application logs (/var/log/openhwy/)"
        - "Nginx/Caddy access logs"
      
      retention: "14 days"
    
    alerting:
      channels:
        - "PagerDuty (critical)"
        - "Slack (#openhwy-alerts)"
        - "Email (admin@open-hwy.com)"
      
      critical_alerts:
        - "Any box offline > 5 minutes"
        - "Rust backend error rate > 5%"
        - "Database connection failure"
        - "Payment processing failure"
        - "Agent crash loop"
  
  backups:
    database:
      frequency: "Every 6 hours"
      retention: "30 days"
      location: "safebox + S3 (Oracle Cloud)"
      tool: "pg_dump + pg_basebackup"
    
    config:
      frequency: "Daily"
      retention: "90 days"
      location: "safebox"
      includes:
        - "/etc/openhwy/"
        - "/home/admin/WORKSPACE/openhwy/"
        - "SSH keys"
    
    disaster_recovery:
      rpo: "6 hours (Recovery Point Objective)"
      rto: "2 hours (Recovery Time Objective)"
      
      procedure:
        1: "Restore database from safebox"
        2: "Deploy services from Docker images"
        3: "Restore config from safebox"
        4: "Update DNS to failover box"
  
  security:
    ssh:
      key_only: true
      disable_root: true
      fail2ban: "Enabled (10 failed attempts = 1 hour ban)"
    
    firewall:
      tool: "ufw (Uncomplicated Firewall)"
      rules:
        - "Allow 22/tcp (SSH, whitelisted IPs)"
        - "Allow 80,443/tcp (HTTP/HTTPS, public)"
        - "Deny all other incoming"
        - "Allow all outgoing"
    
    ssl:
      provider: "Let's Encrypt"
      manager: "Caddy (automatic renewal)"
      grade: "A+ (SSL Labs)"
    
    secrets:
      manager: "HashiCorp Vault"
      location: "workbox:8200"
      
      stored_secrets:
        - "Database passwords"
        - "API keys (Stripe, Twilio, etc.)"
        - "JWT signing key"
        - "SSH private keys"
        - "Blockchain private keys"



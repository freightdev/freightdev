# OpenHWY tmux configuration
# Add to ~/.tmux.conf

# ============================================
# OpenHWY Keybindings
# ============================================

# Marketeer Dashboard (split horizontal, 40% height at bottom)
bind-key M split-window -v -p 40 "~/bin/marketeer-dashboard ~/marketeer-workbox.toml"

# Agent Builder (new window)
bind-key A new-window -n "agent-builder" "~/bin/agent-builder"

# Quick status check (popup)
bind-key S display-popup -E "openhwy status"

# SSH shortcuts (new window for each box)
bind-key h new-window -n "helpbox" "ssh admin@helpbox"
bind-key H new-window -n "hostbox" "ssh admin@hostbox"
bind-key C new-window -n "callbox" "ssh admin@callbox"
bind-key B new-window -n "safebox" "ssh admin@safebox"

# Moon environment launcher (popup to enter config/script)
bind-key L display-popup -E "bash -c 'read -p \"Config: \" cfg; read -p \"Script: \" script; ~/bin/moon-env \$cfg \$script'"

# ============================================
# Session Management for OpenHWY
# ============================================

# Quick OpenHWY workspace setup
bind-key O run-shell "tmux new-session -d -s openhwy \; \
  send-keys -t openhwy:0 'ranger' C-m \; \
  split-window -t openhwy:0 -v -p 30 \; \
  send-keys -t openhwy:0.1 'openhwy status' C-m \; \
  new-window -t openhwy:1 -n 'code' \; \
  send-keys -t openhwy:1 'nvim' C-m \; \
  new-window -t openhwy:2 -n 'marketeer' \; \
  send-keys -t openhwy:2 '~/bin/marketeer-dashboard ~/marketeer-workbox.toml' C-m \; \
  select-window -t openhwy:0 \; \
  attach -t openhwy"

# ============================================
# Status Bar Enhancement
# ============================================

# Show connected systems in status bar
set -g status-right "#[fg=cyan]#{?client_prefix,⌨️ ,}#[fg=yellow]📦 #{session_name} #[fg=green]| 🚛 OpenHWY #[fg=white]%H:%M"
set -g status-right-length 60

# Window format shows agent count
setw -g window-status-format "#I:#W"
setw -g window-status-current-format "#I:#W*"

# ============================================
# Mouse Support (optional)
# ============================================

# Enable mouse for easy pane selection
set -g mouse on

# ============================================
# Copy Mode (for logs)
# ============================================

# Vi-style copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

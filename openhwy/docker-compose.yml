version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fedtms-postgres
    environment:
      POSTGRES_USER: fedtms
      POSTGRES_PASSWORD: fedtms_dev_password
      POSTGRES_DB: fedtms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fedtms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fedtms-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fedtms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fedtms-network

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: fedtms-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_root
    command: minio server /minio_root --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fedtms-network

  # Auth Service (Go microservice)
  auth-service:
    build:
      context: ./src/services/auth-service
      dockerfile: Dockerfile
    container_name: fedtms-auth-service
    environment:
      DATABASE_URL: postgresql://fedtms:fedtms_dev_password@postgres:5432/fedtms
      JWT_SECRET: your-secret-key-change-this-at-least-32-characters
      JWT_EXPIRY: "3600"
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fedtms-network
    restart: unless-stopped

  # Payment Service (Go microservice)
  payment-service:
    build:
      context: ./src/services/payment-service
      dockerfile: Dockerfile
    container_name: fedtms-payment-service
    environment:
      DATABASE_URL: postgresql://fedtms:fedtms_dev_password@postgres:5432/fedtms
      JWT_SECRET: your-secret-key-change-this-at-least-32-characters
      PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fedtms-network
    restart: unless-stopped

  # Email Service (Go microservice)
  email-service:
    build:
      context: ./src/services/email-service
      dockerfile: Dockerfile
    container_name: fedtms-email-service
    environment:
      PORT: "9011"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FROM_EMAIL: noreply@fedtms.local
      FROM_NAME: "FED-TMS"
    ports:
      - "9011:9011"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9011/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fedtms-network
    restart: unless-stopped

  # User Service (Go microservice)
  user-service:
    build:
      context: ./src/services/user-service
      dockerfile: Dockerfile
    container_name: fedtms-user-service
    environment:
      DATABASE_URL: postgresql://fedtms:fedtms_dev_password@postgres:5432/fedtms
      JWT_SECRET: your-secret-key-change-this-at-least-32-characters
      PORT: "8082"
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fedtms-network
    restart: unless-stopped

  # Next.js Frontend App (Dispatcher Dashboard + Driver Portal)
  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
    container_name: fedtms-app
    environment:
      DATABASE_URL: postgresql://fedtms:fedtms_dev_password@postgres:5432/fedtms
      JWT_SECRET: your-secret-key-change-this-at-least-32-characters
      AUTH_SERVICE_URL: http://auth-service:8080
      PAYMENT_SERVICE_URL: http://payment-service:8081
      EMAIL_SERVICE_URL: http://email-service:9011
      USER_SERVICE_URL: http://user-service:8082
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: fedtms
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - minio
      - auth-service
      - payment-service
      - email-service
      - user-service
    networks:
      - fedtms-network
    restart: unless-stopped

  # Next.js API Server
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fedtms-api
    environment:
      DATABASE_URL: postgresql://fedtms:fedtms_dev_password@postgres:5432/fedtms
      JWT_SECRET: your-secret-key-change-this-at-least-32-characters
      AUTH_SERVICE_URL: http://auth-service:8080
      PAYMENT_SERVICE_URL: http://payment-service:8081
      EMAIL_SERVICE_URL: http://email-service:9011
      USER_SERVICE_URL: http://user-service:8082
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
      - minio
      - auth-service
      - payment-service
      - email-service
      - user-service
    networks:
      - fedtms-network
    restart: unless-stopped

networks:
  fedtms-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

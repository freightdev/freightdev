version: '3.9'
services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - hwy-tms

volumes:
  caddy_data:
  caddy_config:

networks:
  hwy-tms:

#############################
# VM Manifest Schema
# Define virtual machines for zBox profiles
#############################

# VM metadata
vm:
  name: "my-agent-vm"
  type: "microvm"  # microvm (firecracker), standard (kvm), container
  purpose: "agent-sandbox"

# Hypervisor configuration
hypervisor:
  provider: "firecracker"  # firecracker, kvm, qemu

  # Firecracker specific
  firecracker:
    kernel: "/opt/firecracker/kernels/vmlinux"
    rootfs: "/var/lib/zbox/vms/my-agent-vm/rootfs.ext4"
    socket: "/run/firecracker-my-agent-vm.socket"

  # KVM/QEMU specific
  libvirt:
    uri: "qemu:///system"
    domain_type: "kvm"

# Resources
resources:
  vcpus: 2
  memory: "512M"  # 512M, 1G, 2G, etc.

  # Disk configuration
  disks:
    - name: "root"
      size: "10G"
      filesystem: "ext4"  # ext4, lvm2, zfs, btrfs, xfs
      mount: "/"

    - name: "data"
      size: "5G"
      filesystem: "ext4"
      mount: "/data"

# Network configuration
network:
  interfaces:
    - name: "eth0"
      type: "tap"  # tap, bridge, nat
      ip: "192.168.100.10/24"
      gateway: "192.168.100.1"
      dns:
        - "8.8.8.8"
        - "1.1.1.1"

  hostname: "agent-vm-01"

  # Firewall rules
  firewall:
    default_policy: "drop"
    rules:
      - port: 22
        protocol: "tcp"
        action: "allow"
        source: "192.168.100.0/24"

# System configuration
system:
  # Base image
  base_image: "debian:12"  # or custom rootfs path

  # Packages to install
  packages:
    - "zsh"
    - "git"
    - "curl"
    - "vim"

  # Users
  users:
    - name: "agent"
      sudo: false
      shell: "/bin/zsh"
      home: "/home/agent"

    - name: "admin"
      sudo: true
      shell: "/bin/zsh"

  # Init system
  init: "systemd"  # systemd, openrc, runit

# zBox integration
zbox:
  # Mount zBox inside VM
  mount_zbox: true
  mount_path: "/opt/zbox"

  # Profile to load in VM
  profile: "agent-sandbox"

  # Share specific directories
  shared_dirs:
    - host: "$ZBOX_RESOURCES"
      guest: "/mnt/resources"
      readonly: true

    - host: "$HOME/workspace"
      guest: "/mnt/workspace"
      readonly: false

# Lifecycle management
lifecycle:
  # Auto-start on profile activation
  autostart: false

  # Persistent or ephemeral
  persistent: true

  # Snapshot configuration
  snapshots:
    enabled: true
    auto_snapshot: true
    retention: 7  # days

# Monitoring
monitoring:
  enabled: true
  metrics:
    - cpu
    - memory
    - disk
    - network

  logs:
    path: "$ZBOX_AI/logs/vms"
    rotation: "daily"

# Orchestration (if using Nomad)
nomad:
  job_name: "zbox-agent-vm"
  datacenter: "zbox-dc1"

  # Constraints
  constraints:
    - attribute: "${attr.cpu.arch}"
      value: "amd64"

# Hooks
hooks:
  on_create:
    - "echo 'Creating VM: my-agent-vm'"
    - "zbox_vm_prepare_rootfs"

  on_start:
    - "echo 'Starting VM: my-agent-vm'"
    - "zbox_vm_wait_boot"

  on_stop:
    - "echo 'Stopping VM: my-agent-vm'"
    - "zbox_vm_snapshot_state"

  on_destroy:
    - "echo 'Destroying VM: my-agent-vm'"
    - "zbox_vm_cleanup"

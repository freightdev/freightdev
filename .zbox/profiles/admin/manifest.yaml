#############################
# Admin Profile Manifest
# FULL ACCESS - Everything loaded
#############################

# Profile metadata
profile:
  name: "admin"
  version: "1.0.0"
  description: "Administrator profile with full system access and all features loaded"
  author: "Jesse E.E.W. Conley"
  created: "2025-11-22"

# Agent configuration
agent:
  name: "admin-agent"
  type: "administrator"
  isolation_level: "none"  # Full unrestricted access
  session:
    persistent: true
    monitor: true
    pid_tracking: true

# Environment variables
environment:
  vars:
    ADMIN_MODE: "true"
    FULL_ACCESS: "true"
    ZBOX_ADMIN: "1"

    # Infrastructure vars
    LIBVIRT_DEFAULT_URI: "qemu:///system"
    FIRECRACKER_BIN: "/usr/bin/firecracker"
    NOMAD_ADDR: "http://localhost:4646"

  paths:
    - "$HOME/.local/bin"
    - "$HOME/.cargo/bin"
    - "$HOME/go/bin"
    - "$ZBOX_BIN"
    - "/usr/local/bin"
    - "/opt/firecracker/bin"
    - "/opt/nomad/bin"

  dotenv: []

# Resources to load - EVERYTHING!
resources:
  # Load ALL configs
  configs:
    - "$ZBOX_CFG/defaults/*.zsh"
    - "$ZBOX_CFG/settings/*.zsh"
    - "$ZBOX_PROFILES/workspace/config/*.zsh"

  # Load ALL functions from source
  functions:
    - "$ZBOX_SRC/agents/*.zsh"
    - "$ZBOX_SRC/helpers/*.zsh"
    - "$ZBOX_SRC/suites/*.zsh"

  # Load ALL tools
  tools:
    - "$ZBOX_TOOLS/core/*.zsh"
    - "$ZBOX_TOOLS/system/*.zsh"
    - "$ZBOX_TOOLS/golang/*.zsh"
    - "$ZBOX_TOOLS/utility/*.zsh"

  # All plugins
  plugins:
    - "all"

# Access controls - UNRESTRICTED
access:
  read_paths:
    - "/"  # Everything

  write_paths:
    - "/"  # Everything

  blocked_paths: []  # Nothing blocked

  network:
    enabled: true
    allowed_hosts: []  # All hosts
    blocked_hosts: []

  # System privileges
  privileges:
    sudo: true
    docker: true
    libvirt: true
    systemctl: true
    firecracker: true
    nomad: true

# Infrastructure management
infrastructure:
  # VM management
  vms:
    enabled: true
    default_hypervisor: "kvm"  # kvm, firecracker, qemu
    default_filesystem: "ext4"  # ext4, lvm2, zfs, btrfs

    providers:
      - name: "libvirt"
        enabled: true
        uri: "qemu:///system"

      - name: "firecracker"
        enabled: true
        socket_path: "/run/firecracker.socket"

      - name: "qemu"
        enabled: true

  # Container management
  containers:
    enabled: true
    runtimes:
      - "docker"
      - "podman"
      - "containerd"

  # Orchestration
  orchestration:
    nomad:
      enabled: true
      datacenter: "zbox-dc1"
      region: "global"

    # Future: k8s, swarm, etc.

# Symlinks
symlinks: {}

# Aliases - Admin shortcuts
aliases:
  # Profile management
  plist: "zbox_list_profiles"
  pinfo: "zbox_profile_info"
  pswitch: "zbox_switch_profile"
  pmon: "zbox_monitor_profiles"
  pkill: "zbox_kill_profile"

  # VM shortcuts
  vmlist: "zbox_vm_list"
  vmcreate: "zbox_vm_create"
  vmstart: "zbox_vm_start"
  vmstop: "zbox_vm_stop"
  vmkill: "zbox_vm_destroy"

  # Container shortcuts
  clist: "docker ps -a"
  crun: "docker run"
  cexec: "docker exec -it"

  # Infrastructure
  nstatus: "nomad status"
  njobs: "nomad job status"
  nrun: "nomad job run"

  # System
  work: "cd $HOME/workspace"
  freq: "cd $HOME/freightdev"
  proj: "cd $HOME/projects"
  zbox: "cd $ZBOX_DIR"
  admin: "cd $ZBOX_PROFILES/admin"

# Hooks
hooks:
  on_activate:
    - "echo '[ZBOX] 🔓 Admin profile activated - FULL ACCESS MODE'"
    - "zbox_init_profile_monitor"
    - "zbox_check_infrastructure"

  on_deactivate:
    - "echo '[ZBOX] 🔒 Admin profile deactivated'"
    - "zbox_cleanup_profile_monitor"

  on_error:
    - "echo '[ZBOX] ⚠️  Error in admin profile'"
    - "zbox_log_error"

# Dependencies
dependencies:
  - "base-system"
  - "infrastructure"

[daemon]
enabled = true
pid_file = "~/.config/runa/runad.pid"
log_file = "~/.config/runa/runad.log"
monitor_interval = 300

[paths]
freightdev_dir = "~/freightdev/.freightdev.d"
src_dir = "~/freightdev/.freightdev.d/src"
envd_dir = "~/freightdev/.freightdev.d/env.d"
rsrc_dir = "~/freightdev/.freightdev.d/resource"
prf_dir = "~/freightdev/.freightdev.d/profile"
manifest_dir = "~/freightdev/.freightdev.d/profile/manifest"
script_dirs = [
    "/home/admin/freightdev/.freightdev.d/src/setting",
    "/home/admin/freightdev/.freightdev.d/src/helper",
    "/home/admin/freightdev/.freightdev.d/src/logic",
    "/home/admin/freightdev/.freightdev.d/src/agent",
    "/home/admin/freightdev/main/devtools",
    "/home/admin/freightdev/main/scripts",
]

[environment]
default = "workspace"
auto_detect = true
verbose = false

[profile]
default = "workspace"
auto_load = true
manifest_file = "workspace.yaml"

[scripts]
auto_source = true
execution_timeout = 30

[exports]
monitor_shell_history = true
auto_save = true
save_file = "~/.config/runa/exports.zsh"

[logging]
level = "info"
file = "~/.config/runa/runa.log"
max_size = "10MB"
max_files = 5

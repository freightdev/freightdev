# .memory/schemas/meta.base.schema.yaml

id:            # Unique ID for this object, file, or record
  type: string
  required: true

kind:          # Kind of meta object (tool, prompt, agent, doc, etc.)
  type: string
  required: true

name:          # Human-readable name
  type: string
  required: true

version:   # Short purpose summary
  type: string
  required: true

description:   # Short purpose summary
  type: string
  required: true

tags:          # Keywords for search or filtering
  type: array
  items: string
  required: true

created_at:    # Timestamp of creation (ISO 8601)
  type: string
  format: date-time
  required: true

updated_at:    # Last updated (ISO 8601)
  type: string
  format: date-time
  required: true

author:        # Who made this
  type: object
  required: true
  properties:
    name:
      type: string
    email:
      type: string
    agent_id:
      type: string

source:        # Where the content came from
  type: object
  required: false
  properties:
    repo:
      type: string
    path:
      type: string
    url:
      type: string

links:         # Related docs or references
  type: array
  items:
    type: string

license:       # Any license info
  type: string
  required: false

visible:       # Should this be listed
  type: string
  enum: [public, private, system]
  default: public
  required: false

status:        # draft, active, archived, deprecated
  type: string
  enum: [draft, active, archived, deprecated]
  default: active
  required: true

confidence:    # AI confidence score, if applicable
  type: float
  minimum: 0.0
  maximum: 1.0
  required: false

priority:      # For task/meta sorting
  type: float
  minimum: 0.0
  maximum: 1.0
  required: false

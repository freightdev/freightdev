# ---- Git Private Repositories ----
GIT:$GIT_URL/$MY_URL.git:$MAIN_DIR
GIT:$GIT_URL/$DEV_URL.git:$MAIN_DIR
GIT:$GIT_URL/$REPO_URL.git:$MAIN_DIR

# ---- Git Public Repositories ----
GIT:https://github.com/scopatz/nanorc.git:$HOME
GIT:https://github.com/tmux-plugins/tpm:$HOME/.tmux/plugins/tpm

# Add more git repos here

# ---- Scripts to Run ----
SCRIPT:$HOME/_dev/dev-env/install-zsh-plugins.sh

# ========================================
# INIT CONFIGS
# ========================================
# Format: TYPE:SOURCE:DESTINATION:[FLAGS]
# TYPE:
#   FILE   = single file
#   DIR    = directory
#   PKG    = system package
#   GIT    = git repository
#   CMD    = run command
#   SCRIPT = run script
# FLAGS:
#   symlink  = create symbolic link instead of copy
#   encrypt  = encrypt using gpg
#   decrypt  = decrypt using gpg
#   sudo     = requires elevated privileges
# ========================================

# ---- Dotdicts ----
DIR:$HOME/_dev/dotfiles/.zshrc.d:$HOME/.zshrc.d:symlink
DIR:$HOME/_dev/dotfiles/.config/nvim:$HOME/.config/nvim:symlink
DIR:$HOME/_dev/dotfiles/.config/tmux:$HOME/.config/tmux:symlink

# ---- Dotfiles ----
FILE:$HOME/_dev/dotfiles/.gitconfig:$HOME/.gitconfig:symlink
FILE:$HOME/_dev/dotfiles/.zshrc:$HOME/.zshrc:symlink
FILE:$HOME/_dev/dotfiles/.tmux.conf:$HOME/.tmux.conf:symlink
# Add more dotfiles here

# ---- Sensitive / Encrypted ----
DIR:$HOME/_dev/secure/.ssh:$HOME/.ssh:decrypt
DIR:$HOME/_dev/secure/.gnupg:$HOME/.gnupg:decrypt
# Add more encrypted secrets here

# ---- Core Packages ----

# Setup
PKG: ranger             # Modern Shell Navigator (recommended)
PKG: zsh                # Powerful shell
PKG: git                # Distributed version control system
PKG: curl               # Command-line tool for transferring data over HTTP/FTP
PKG: wget               # Download files from the web
PKG: tmux               # Terminal multiplexer for managing multiple sessions
PKG: tree               # Display directory structures as a tree
PKG: cat                # Print out file content
PKG: nano               # Simple text editor
PKG: ripgrep            # Fast search tool for text
PKG: less               # Content viewer
PKG: fd                 # Blazing fast finder tool
PKG: exa

# Scripting
PKG: awk                # Built for text processing
PKG: tr                 # Can translate characters
PKG: sed                # Classic find/replace text
PKG: jq                 # Process and format JSON data
PKG: yq                 # Process and format YAML data

# Programming
PKG: python3            # Python programming language (v3)
PKG: python3-pip        # Python package manager
PKG: nodejs             # JavaScript runtime
PKG: npm                # Node.js package manager
PKG: pnpm               # Fast, disk-efficient Node.js package manager
PKG: yarn               # Alternative Node.js package manager
PKG: golang             # Go programming language
PKG: rustc              # Rust programming language compiler
PKG: cargo              # Rust package manager
PKG: make               # Build automation tool
PKG: cmake              # Cross-platform build system
PKG: gcc                # GNU C compiler
PKG: g++                # GNU C++ compiler
PKG: clang              # C/C++/Objective-C compiler

# Archiving
PKG: unzip              # Extract ZIP archives
PKG: zip                # Create ZIP archives
PKG: tar                # Create/extract TAR archives
PKG: bunzip2
PKG: unrar
PKG: gunzip
PKG: uncompress
PKG: 7z
PKG: unxz
PKG: cabextract

# Compression
PKG: zram               # Compression for Memory (blazing fast)
PKG: xz-utils           # Compression utilities for .xz files
PKG: gzip               # Compression tool for .gz files
PKG: rsync              # File syncing and transfer tool

# Security
PKG: openssh-client     # SSH client for remote connections
PKG: openssh-server     # SSH server to accept remote connections
PKG: gnupg              # GNU Privacy Guard for encryption/signing (max security)
PKG: pass               # Simple password manager using GPG

# Container
PKG: docker             # Container platform
PKG: docker-compose     # Define/run multi-container Docker apps

# Monitoring
PKG: htop               # Interactive process viewer

# Browser
PKG: firefox            # Well maintained browers


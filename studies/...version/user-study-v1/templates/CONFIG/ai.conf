# AI Configs
# ------------------------------

[profile.dev]
packages.pacman = base-devel git zsh neovim wget curl tmux htop
packages.pip = torch torchvision torchaudio transformers datasets accelerate
packages.conda = numpy pandas scipy matplotlib seaborn jupyterlab
tools.install = zshctr tmpctr sshctr sysctr apictr
tools.custom = archbox echo-ops

[profile.server]
packages.pacman = docker docker-compose nvidia-utils nvidia-container-toolkit
packages.pip = torch torchvision torchaudio transformers accelerate tritonclient
tools.install = zshctr sshctr sysctr apictr
tools.custom = echo-ops

[profile.ai]
packages.pacman = git cmake wget curl gcc g++ make htop tmux unzip bzip2
packages.pip = torch torchvision torchaudio transformers datasets accelerate tensorboard
packages.conda = jupyterlab pandas numpy scikit-learn matplotlib seaborn
tools.install = zshctr tmpctr sshctr sysctr apictr ai-toolkit
tools.custom = archbox echo-ops trainer-asus

[profile.ai.gpu]
cuda.version = 12.9
cudnn.version = 8.9
nccl.version = 2.19
gpu.devices = 0,1,2,3
gpu.memory_pool = 16GB
gpu.precision = fp16
gpu.allow_mixed_precision = true
gpu.enable_tensor_rt = true
gpu.enable_profiling = true

[profile.paths]
dotfiles = ${DOTFILES_DIR}
tools = ${TOOLS_DIR}
bin = ${BIN_DIR}
envs = ${ENV_DIR}
data = ${DATA_DIR}
models = ${MODELS_DIR}
logs = ${LOGS_DIR}
cache = ${CACHE_DIR}
tmp = ${TMP_DIR}

[profile.ai.training]
training.default_batch = 64
training.default_epochs = 50
training.optimizers = adamw,lamb,sgd
training.lr_scheduler = cosine,linear
training.gradient_accumulation_steps = 4
training.fp16 = true
training.gradient_checkpointing = true

[profile.ai.network]
http_proxy = ${HTTP_PROXY}
https_proxy = ${HTTPS_PROXY}
no_proxy = ${NO_PROXY}
remote_data_host = s3://my-ml-datasets
artifact_host = https://artifacts.example.com
model_registry = /mnt/models

[profile.ai.logging]
log_level = DEBUG
log_format = json
log_rotate_size = 500MB
log_backup_count = 10
log_dir = ${LOGS_DIR}

[profile.ai.cache]
cache_mode = disk
cache_dir = ${CACHE_DIR}/ai_cache
tmp_mode = tmpfs
tmp_dir = ${TMP_DIR}

[profile.ai.misc]
timezone = ${TZ}
locale = ${LANG}
threads = ${AI_NUM_THREADS}
enable_tensor_rt = ${AI_USE_TENSORRT}
enable_profiling = ${AI_ENABLE_PROFILING}

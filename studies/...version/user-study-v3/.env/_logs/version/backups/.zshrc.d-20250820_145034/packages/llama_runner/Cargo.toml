[package]
name        = "llama_runner"
version     = "0.1.0"
edition     = "2024"
build       = "build.rs"
description = "A blazing-fast, local model runner w/ Rust FFI Bindings wrapping llama.cpp."
license     = "MIT"
repository  = "https://github.com/freightdev/llama-runner"
readme      = "README.md"
include     = [
  "README.md",
  "src/**/*",
  "build.rs",
  "wrapper.h",
]

[lib]
name = ""
path = "src/lib.rs"

[dependencies]
libc       = "0.2"
log        = "0.4"
env_logger = "0.11"
clap       = { version = "4", features = ["derive"] }
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[build-dependencies]
bindgen = "0.72"

[features]
[features]
default = []
cuda = []
metal = []
blas = []
openmp = []
regen-bindings = []       # toggle with `--features regen-bindings`

[profile.release]
opt-level     = 3         # trade compile time vs runtime speed - "z" for smaller binaries
lto           = true      # link-time optimization
codegen-units = 1         # best-optimized single-unit build
strip         = "symbols" # strip symbols but keep backtraces
panic         = "abort"   # smaller binary

[profile.dev]
opt-level       = 1
debug           = true
overflow-checks = true

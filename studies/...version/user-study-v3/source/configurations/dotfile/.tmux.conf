# ================================
# Jesse's Master Tmux Config
# ================================

# --- General settings ---
set -g default-terminal "screen-256color"
set -as terminal-overrides ',xterm-256color:RGB'
set -g history-limit 30000
set -g mouse on
set -g escape-time 0
setw -g monitor-activity on
set -g visual-activity on

# --- Colors ---
set -g status-bg colour235
set -g status-fg white

set -g status-left-length 40
set -g status-right-length 100

# Session name left
set -g status-left "#[fg=green,bold] #S #[fg=white]|"

# Date/time right
set -g status-right "#[fg=yellow] %Y-%m-%d #[fg=cyan] %H:%M #[default]"

# Active window
set-window-option -g window-status-current-format "#[fg=black,bg=green,bold] #I:#W #[default]"

# Inactive window
set-window-option -g window-status-format "#[fg=white,bg=colour235] #I:#W #[default]"

# Pane border colors
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39

# Message text
set -g message-style bg=colour235,fg=yellow

# Command prompt
set -g message-command-style bg=colour235,fg=cyan

# Copy mode colors
setw -g mode-style bg=colour239,fg=yellow

# --- Prefix key ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Pane navigation (Vim style) ---
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# --- Split panes ---
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# --- Window management ---
bind c new-window -c "#{pane_current_path}"
bind & kill-window
bind x kill-pane
bind , rename-window
bind . move-window
bind r source-file ~/.../.tmux.conf \; display-message "Tmux config reloaded!"

# --- Status bar ---
set -g status-interval 5
set -g status-justify centre
set -g status-bg colour235
set -g status-fg white

set -g status-left "#[fg=green,bold]#S #[fg=white]|"
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M #[default]"

# --- Active / inactive window colors ---
set-window-option -g window-status-current-format "#[bg=blue,fg=white,bold] #I:#W #[default]"
set-window-option -g window-status-format "#[fg=white] #I:#W "

# --- Copy mode with vi keys ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- Reload shortcut ---
bind R source-file ~/.tmux.conf \; display-message "Config reloaded"

# --- Plugins (optional) ---
# Run this once: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'

name: "Story Fixer"
description: "Automatically fixes story filenames to match YAML tale and title values"
version: "1.0"

variables:
  tale_format: "zero_padded"
  title_slug_format: "lowercase_hyphenated"
  backup_enabled: true

prompts:
  - key: story_directory
    question: "Which story directory to process?"
    type: input
    default: "."
    validation: "^[a-zA-Z0-9._/-]+$"

  - key: tale_format_choice
    question: "Tale number format:"
    type: select
    options: ["zero_padded", "no_padding"]
    default: "zero_padded"

  - key: create_backup
    question: "Create backup before renaming?"
    type: select
    options: ["yes", "no"]
    default: "yes"

  - key: dry_run_first
    question: "Show preview first?"
    type: select
    options: ["yes", "no"]
    default: "yes"

conditions:
  - name: should_backup
    expression: "{{create_backup}} == 'yes'"

  - name: zero_padded_format
    expression: "{{tale_format_choice}} == 'zero_padded'"

actions:
  - type: run_command
    description: "Ensure target directory exists"
    cmd: |
      if [ ! -d "{{story_directory}}" ]; then
        echo "❌ Directory does not exist: {{story_directory}}"
        exit 1
      fi

  - type: run_command
    description: "Create backup directory"
    condition: "should_backup"
    cmd: "mkdir -p {{story_directory}}/backup"

  - type: run_command
    description: "Backup original files"
    condition: "should_backup"
    cmd: "find {{story_directory}} -name '*.md' -exec cp {} {{story_directory}}/backup/ \\;"

  - type: run_command
    description: "Show preview of changes"
    condition: "{{dry_run_first}} == 'yes'"
    cmd: |
      echo "🔍 Preview of changes in {{story_directory}}:"
      for file in {{story_directory}}/*.md; do
        if [[ -f "$file" ]]; then
          tale=$(grep "^tale:" "$file" | sed 's/tale: *//')
          title=$(grep "^title:" "$file" | sed 's/title: *//' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9 ]//g' | sed 's/ \+/-/g')
          if [[ -n "$tale" && -n "$title" ]]; then
            if [[ "{{tale_format_choice}}" == "zero_padded" ]]; then
              formatted_tale=$(printf "t%02d" "$tale")
            else
              formatted_tale="t${tale}"
            fi
            expected_name="${formatted_tale}.${title}.md"
            current_name=$(basename "$file")
            if [[ "$current_name" != "$expected_name" ]]; then
              echo "  → $current_name → $expected_name"
            else
              echo "  ✓ $current_name (correct)"
            fi
          fi
        fi
      done

  - type: run_command
    description: "Rename files to match YAML content"
    condition: "{{dry_run_first}} == 'no'"
    cmd: |
      cd {{story_directory}}
      for file in *.md; do
        if [[ -f "$file" ]]; then
          tale=$(grep "^tale:" "$file" | sed 's/tale: *//')
          title=$(grep "^title:" "$file" | sed 's/title: *//' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9 ]//g' | sed 's/ \+/-/g')
          if [[ -n "$tale" && -n "$title" ]]; then
            if [[ "{{tale_format_choice}}" == "zero_padded" ]]; then
              formatted_tale=$(printf "t%02d" "$tale")
            else
              formatted_tale="t${tale}"
            fi
            expected_name="${formatted_tale}.${title}.md"
            if [[ "$file" != "$expected_name" ]]; then
              if [[ -f "$expected_name" ]]; then
                echo "⚠️  Target exists: $expected_name"
              else
                mv "$file" "$expected_name"
                echo "✅ Renamed: $file → $expected_name"
              fi
            fi
          fi
        fi
      done

  - type: create_file
    target: "{{story_directory}}/rename_report.txt"
    description: "Create processing report"
    content: |
      Story Fixer Report
      ==================
      Date: {{timestamp}}
      Directory: {{story_directory}}
      Format: {{tale_format_choice}}
      Backup Created: {{create_backup}}
      
      Processing completed successfully.
      Files processed with pattern: t{tale}.{title-slug}.md
      
      {% if create_backup == 'yes' %}
      Backup location: {{story_directory}}/backup/
      {% endif %}
